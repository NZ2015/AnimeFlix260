
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lecteur Vidéo - AnimeFlix26</title>
    <link rel="stylesheet" href="joueur-style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-container">
            <a href="index.html" class="logo">
                <i class="fas fa-play-circle"></i>
                <span>AnimeFlix26</span>
            </a>
            <a href="index.html" class="back-btn">
                <i class="fas fa-arrow-left"></i>
                Retour
            </a>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <div class="player-container">
           <!-- Vidéo Player -->
<div class="video-player">

    <video id="videoPlayer" controls width="100%">
        <source id="videoSource" src="" type="video/mp4">
        Votre navigateur ne supporte pas la vidéo HTML5.
    </video>

          <!-- CONTROLES NETFLIX -->
          <div class="controls">
              <button onclick="prevEpisode()">⏮</button>
              <button onclick="togglePlay()">⏯</button>
              <button onclick="nextEpisode()">⏭</button>
              <button onclick="fullscreen()">⛶</button>
        </div>

    </div>

            <!-- Episode Info -->
            <div class="episode-info">
                <div class="info-header">
                    <h1 id="animeTitle">Chargement...</h1>
                    <p id="episodeTitle" class="episode-title">Episode 1</p>
                </div>
                <p id="episodeDescription" class="episode-description">Description en cours de chargement...</p>
            </div>

            <!-- Seasons Selection -->
            <div class="seasons-container">
                <h2>Saisons</h2>
                <div id="seasonsList" class="seasons-list">
                    <!-- Les saisons seront injectées ici par JavaScript -->
                </div>
            </div>

            <!-- Episodes List -->
            <div class="episodes-container">
                <h2>Episodes</h2>
                <div id="episodesList" class="episodes-list">
                    <!-- Les episodes seront injectés ici par JavaScript -->
                </div>
            </div>
        </div>

        <!-- Related Animes Sidebar -->
        <aside class="sidebar">
            <h2>Plus d'animes</h2>
            <div id="relatedAnimes" class="related-animes">
                <!-- Les animes recommandés seront injectés ici -->
            </div>
        </aside>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2026 AnimeFlix26. Tous droits réservés.</p>
        </div>
    </footer>
<script>
const params = new URLSearchParams(window.location.search);
let currentSeason = 0;
let currentEpisode = 0;
const animeId = parseInt(params.get("animeId"));
const seasonIndex = parseInt(params.get("season")) || 0;
const episodeIndex = parseInt(params.get("episode")) || 0;

const videoPlayer = document.getElementById("videoPlayer");

let animeData = null;

// 🔥 Charger anime.json
fetch("anime.json")
  .then(res => res.json())
  .then(data => {
    animeData = data.animes.find(a => a.id === animeId);

    if (animeData) {
      loadEpisode(seasonIndex, episodeIndex);
      renderInfo();
    }
  });

// ▶ Charger épisode
function loadEpisode(season, episode) {

  if (!animeData) return;

  const ep = animeData.seasons[season].episodes[episode];

  videoSource.src = ep.videoUrl;
  videoPlayer.load();

  videoPlayer.oncanplay = () => {
    videoPlayer.play();
  };

  currentSeason = season;
  currentEpisode = episode;

  document.getElementById("episodeTitle").innerText = ep.title;
  document.getElementById("animeTitle").innerText = animeData.title;
}
// ▶ Info anime
function renderInfo() {
  document.getElementById("animeTitle").innerText = animeData.title;
}

// ▶ Next episode
function nextEpisode() {
  const episodes = animeData.seasons[currentSeason].episodes;

  if (currentEpisode < episodes.length - 1) {
    loadEpisode(currentSeason, currentEpisode + 1);
  }
}

// ▶ Previous episode
function prevEpisode() {
  if (currentEpisode > 0) {
    loadEpisode(currentSeason, currentEpisode - 1);
  }
}

// ▶ Play/Pause
function togglePlay() {
  if (videoPlayer.paused) videoPlayer.play();
  else videoPlayer.pause();
}

// ⛶ Fullscreen
function fullscreen() {
  videoPlayer.requestFullscreen();
}

// ▶ Auto next
videoPlayer.addEventListener("ended", nextEpisode);
</script>
</body>
</html>
